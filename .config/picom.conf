# main
backend = "glx";
glx-no-stencil = true;

# window
fading = true;
fade-delta = 5;
corner-radius = 4;
active-opacity = 1;
inactive-opacity = 0.75;
opacity-rule = [
  "100:class_g = 'Rofi'"
];

# blur
blur-method = "dual_kawase";
blur-size = 16;
blur-strength = 8;
blur-background-exclude = [
  "class_g = 'Rofi'",
  "class_g ^= 'eww'"
];
